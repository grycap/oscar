functions:
  oscar:
  - oscar-cluster:
      name: node-red-auth
      cpu: '1.0'
      memory: 2Gi
      image: ghcr.io/rk181/node-red-alpine
      script: script.sh
      alpine: true
      environment:
        variables:
          NODE_RED_BASE_URL: "/system/services/node-red-auth/exposed"
          NODE_RED_DIRECTORY: "/mnt/node-red-auth"
        secrets:
          PASSWORD: "admin"
      mount:
        storage_provider: minio.default
        path: node-red-auth
      expose:
        min_scale: 1
        max_scale: 1
        api_port: 1880
        cpu_threshold: 90
        rewrite_target: true