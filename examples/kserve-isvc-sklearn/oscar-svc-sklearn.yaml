functions:
  oscar:
  - oscar-kserve-y2m:
      name: kserve-isvc-sklearn
      cpu: '1.0'
      memory: 1Gi
      image: docker.io/curlimages/curl:latest
      script: script.sh
      alpine: true
      kserve:
        model_format: sklearn
        storage_uri: "gs://kfserving-examples/models/sklearn/1.0/model"
        min_scale: 1
      log_level: CRITICAL
      input:
      - storage_provider: minio
        path: kserve-isvc-sklearn/input
      output:
      - storage_provider: minio
        path: kserve-isvc-sklearn/output