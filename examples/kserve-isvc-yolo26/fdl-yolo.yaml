functions:
  oscar:
  - oscar-kserve-y2m:
      name: fdl-isvc-yolo-request
      cpu: '1.0'
      memory: 1Gi
      image: ubuntu:22.04
      script: script.sh
      log_level: DEBUG
      input:
      - storage_provider: minio
        path: isvc-yolo-request/input
      output:
      - storage_provider: minio
        path: isvc-yolo-request/output
      mount:
        storage_provider: minio
        path: kserve-models/tf/26