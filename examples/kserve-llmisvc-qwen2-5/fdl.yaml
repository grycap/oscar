functions:
  oscar:
  - oscar-kserve-y2m:
      name: qwen2-5-05b-instruct
      image: ubuntu
      kserve:
        type: llm_inference
        llm_inference:
          runtime_image: ghcr.io/grycap/kserve-vllm-openai-cpu:v0.22.1
        storage_uri: "oci://ghcr.io/grycap/kserve-qwen2-5-05b-instruct:latest"
        cpu: '2.0'
        memory: 6Gi
        args:
          - --dtype=auto
          - --enforce-eager
        env:
          VLLM_CPU_KVCACHE_SPACE: "1"
      log_level: CRITICAL
