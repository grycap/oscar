name: release-helm

on:
  release:
    types: [created]

jobs:
  release:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: helm-charts
    steps:
      - name: Checkout grycap/helm-charts
        uses: actions/checkout@v3
        with:
          repository: grycap/helm-charts
          token: ${{ secrets.HELM_CHARTS_TOKEN }}
          path: helm-charts

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
        working-directory: helm-charts

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: latest

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version=0.2.11

      - name: Install yq
        run: pip install yq

      - name: Set version and tag
        id: vars
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG#v}"
          else
            VERSION="0.0.0-$(git rev-parse --short HEAD)"
            TAG="$VERSION"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Update Chart.yaml version
        run: 'sed -i "s/^version:.*/version: ${{ steps.vars.outputs.VERSION }}/" oscar/Chart.yaml'

      - name: Update values.yaml tag
        run: 'sed -i "s/^  tag:.*/  tag: \"${{ steps.vars.outputs.TAG }}\"/" oscar/values.yaml'

      - name: Helm lint
        run: helm lint oscar/

      - name: Helm dependency update
        run: helm dep update oscar/

      - name: Helm unittest
        run: helm unittest -3 oscar/ -f 'tests/*.yaml'

      - name: Helm package
        run: helm package oscar/

      - name: Update Helm repo index
        run: |
          cat index.yaml | yq -y '.entries.oscar = [.entries.oscar[0]]' | yq -y .entries.oscar > index2.yaml
          awk '/^  oscar:$/{print; system("sed '\''s/^/  /'\'' index2.yaml"); next}1' docs/index.yaml > tmp && mv tmp docs/index.yaml
          mv oscar-* docs/

      - name: Commit and push changes
        if: github.event_name == 'release'
        run: |
          git add docs/ index.yaml
          git commit -m "chore: release oscar ${{ steps.vars.outputs.VERSION }}"
          git push

  update-ansible:
    needs: release
    runs-on: ubuntu-22.04
    if: github.event_name == 'release'
    steps:
      - name: Checkout ansible-role-kubeoscar (devel)
        uses: actions/checkout@v3
        with:
          repository: grycap/ansible-role-kubeoscar
          ref: devel
          path: ansible-role-kubeoscar

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
        working-directory: ansible-role-kubeoscar

      - name: Update values.yaml tag
        run: 'sed -i "s/^oscar_version:.*/oscar_version: \"${{ github.event.release.tag_name }}\"/" defaults/main.yaml'

      - name: Push devel to main
        run: |
          git push https://x-access-token:${{ secrets.HELM_CHARTS_TOKEN }}@github.com/grycap/ansible-role-kubeoscar.git HEAD:main
        working-directory: ansible-role-kubeoscar

  notify:
    needs: release
    runs-on: ubuntu-22.04
    if: github.event_name == 'release'
    steps:
      - name: Send notification
        run: |
          echo "Helm chart released successfully: ${{ github.event.release.tag_name }}"

  update-pkgdev:
    needs: release
    runs-on: ubuntu-22.04
    if: github.event_name == 'release'
    steps:
      - name: Trigger pkg.go.dev indexing
        run: |
          curl -s "https://proxy.golang.org/github.com/grycap/oscar/v4/@v/${{ github.event.release.tag_name }}.info"
