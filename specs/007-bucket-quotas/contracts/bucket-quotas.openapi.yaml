openapi: 3.0.3
info:
  title: OSCAR Bucket Quotas Contract (Planning Draft)
  version: 0.1.0
  description: |
    Planning contract for MinIO bucket count quotas, per-bucket storage quotas,
    and quota reporting in OSCAR.
servers:
  - url: /
paths:
  /system/quotas/user:
    get:
      summary: Get own quotas including MinIO bucket quota usage
      tags:
        - quotas
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user's quota view
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuotaResponse'
        '401':
          description: Unauthorized
        '503':
          description: Quota backend unavailable
  /system/quotas/user/{userId}:
    get:
      summary: Get quotas for a user including MinIO bucket quota usage
      tags:
        - quotas
      security:
        - BasicAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User quota view
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuotaResponse'
        '403':
          description: Forbidden
        '503':
          description: Quota backend unavailable
    put:
      summary: Update quotas for a user including MinIO bucket quota settings
      tags:
        - quotas
      security:
        - BasicAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuotaUpdateRequest'
      responses:
        '200':
          description: Updated user quota view
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuotaResponse'
        '400':
          description: Invalid quota payload
        '403':
          description: Forbidden
        '503':
          description: Quota backend unavailable
  /system/buckets:
    post:
      summary: Create a bucket subject to OSCAR-controlled bucket quota checks
      tags:
        - buckets
      security:
        - BasicAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MinIOBucketRequest'
      responses:
        '201':
          description: Bucket created and per-bucket storage quota applied when configured
        '400':
          description: Invalid bucket definition
        '401':
          description: Unauthorized
        '403':
          description: Bucket count quota exceeded or forbidden
        '500':
          description: MinIO or quota backend error
    get:
      summary: List visible buckets with quota metadata when available
      tags:
        - buckets
      security:
        - BasicAuth: []
        - BearerAuth: []
      responses:
        '200':
          description: Bucket list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MinIOBucket'
  /system/buckets/{bucket}:
    get:
      summary: Get bucket details with quota metadata when available
      tags:
        - buckets
      security:
        - BasicAuth: []
        - BearerAuth: []
      parameters:
        - in: path
          name: bucket
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bucket detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MinIOBucket'
        '404':
          description: Bucket not found
components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    BearerAuth:
      type: http
      scheme: bearer
  schemas:
    QuotaResponse:
      type: object
      required:
        - user_id
      properties:
        user_id:
          type: string
        resources:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/QuotaValues'
        volumes:
          type: object
        minio:
          $ref: '#/components/schemas/MinIOQuotaResponse'
    QuotaValues:
      type: object
      properties:
        max:
          type: integer
          format: int64
        used:
          type: integer
          format: int64
    QuotaUpdateRequest:
      type: object
      properties:
        cpu:
          type: string
        memory:
          type: string
        volumes:
          type: object
        minio:
          $ref: '#/components/schemas/MinIOQuotaUpdate'
    MinIOQuotaUpdate:
      type: object
      description: |
        Administrator-provided MinIO quota settings. OSCAR persists these
        settings in a Kubernetes ConfigMap named `oscar-minio-quota` in the
        target user's namespace.
      properties:
        buckets:
          oneOf:
            - type: string
            - type: integer
        storage_per_bucket:
          type: string
          example: 100Gi
    MinIOQuotaResponse:
      type: object
      description: |
        MinIO quota view derived from the user's `oscar-minio-quota` ConfigMap
        and current MinIO bucket metadata/usage.
      properties:
        buckets:
          $ref: '#/components/schemas/MinIOBucketCountQuota'
        storage_per_bucket:
          $ref: '#/components/schemas/MinIOQuotaStoragePerBucket'
        storage_total:
          $ref: '#/components/schemas/MinIOQuotaStorageTotal'
    MinIOBucketCountQuota:
      type: object
      required:
        - max
        - used
      properties:
        max:
          type: integer
          minimum: 0
          description: Maximum number of OSCAR-attributed buckets. The default response value is 0 when no bucket count quota is configured; an explicit configured value of 0 allows no new OSCAR-managed buckets.
          example: 10
        used:
          type: integer
          minimum: 0
    MinIOStoragePerBucketQuota:
      type: object
      required:
        - max
        - source
      properties:
        max:
          type: string
          description: Per-bucket storage quota; "0" means unset in MinIO.
          example: 100Gi
        source:
          type: string
          enum:
            - default
            - user
            - bucket
            - unset
            - unsupported
    MinIOQuotaStoragePerBucket:
      type: object
      required:
        - max
      properties:
        max:
          type: string
          description: Per-bucket storage quota configured for the user; "0" means unset.
          example: 100Gi
    MinIOQuotaStorageTotal:
      type: object
      properties:
        used:
          type: string
          example: 42Gi
    MinIOBucketRequest:
      type: object
      required:
        - bucket_name
      properties:
        bucket_name:
          type: string
        visibility:
          type: string
          enum:
            - private
            - restricted
            - public
        allowed_users:
          type: array
          items:
            type: string
    MinIOBucket:
      allOf:
        - $ref: '#/components/schemas/MinIOBucketRequest'
        - type: object
          properties:
            owner:
              type: string
            metadata:
              type: object
              additionalProperties:
                type: string
            storage_quota:
              $ref: '#/components/schemas/MinIOStoragePerBucketQuota'
            storage_usage:
              $ref: '#/components/schemas/MinIOBucketStorageUsage'
            attribution:
              type: string
              enum:
                - complete
                - partial
    MinIOBucketStorageUsage:
      type: object
      properties:
        used:
          type: string
        used_bytes:
          type: integer
          format: int64
          minimum: 0
        objects:
          type: integer
          minimum: 0
